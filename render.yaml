services:
  - type: web
    name: sic-rennes
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: sic-rennes-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: APP_SECRET
        generateValue: true
      - key: INITIAL_ADMIN_CODE
        sync: false
